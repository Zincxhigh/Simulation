<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/style.css')}}">
     <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>News</title>
</head>
<body>
<ul class="nav nav-tabs">
  <li class="nav-item">
    <a class="nav-link" href="{{ url_for('home')}}">Simulation</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="{{ url_for('roms') }}">ROMs</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="{{ url_for('Emulators')}}">Emulators</a>
  </li>
   <li class="nav-item">
    <a class="nav-link active" href="{{ url_for('News')}}">News</a>
  </li>
</ul>
<div class="secti">

{% for article in data %}

<h2 class="section">{{ article.title }}</h2>
  {% if article.urlToImage %}
    <img src="{{ article.urlToImage }}" width="400" >
    {% endif %}
<h3>{{ article.description }}</h3>
<a href="{{ article.url }}">Read more</a>

<hr>

{% endfor %}

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
